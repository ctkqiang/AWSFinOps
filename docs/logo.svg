<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- AWS Official: Squid Ink gradient -->
    <linearGradient id="squidInk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E3D50"/>
      <stop offset="100%" stop-color="#232F3E"/>
    </linearGradient>
    <!-- AWS Official: Amazon Orange -->
    <linearGradient id="amazonOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9900"/>
      <stop offset="100%" stop-color="#FF9900"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="512" height="512" rx="80"/>
    </clipPath>
  </defs>

  <g clip-path="url(#shape)">
    <!-- Background: Squid Ink -->
    <rect width="512" height="512" fill="url(#squidInk)"/>

    <!-- ============================================ -->
    <!--  SHIELD / HEXAGON FRAME (security + cloud)   -->
    <!-- ============================================ -->
    <g transform="translate(256, 215)">
      <!-- Outer shield shape -->
      <path d="M 0 -130
               L 112 -65
               L 112 65
               L 0 130
               L -112 65
               L -112 -65 Z"
            fill="none" stroke="#FF9900" stroke-width="3.5" opacity="0.7"/>

      <!-- Inner shield shape (subtle depth) -->
      <path d="M 0 -105
               L 91 -52.5
               L 91 52.5
               L 0 105
               L -91 52.5
               L -91 -52.5 Z"
            fill="#FF9900" opacity="0.06"/>
    </g>

    <!-- ============================================ -->
    <!--  COST CHART: 4 bars descending               -->
    <!-- ============================================ -->
    <g transform="translate(256, 215)">
      <!-- Bar 1 - tallest -->
      <rect x="-60" y="-70" width="24" height="70" rx="3" fill="#FF9900"/>
      <!-- Bar 2 -->
      <rect x="-28" y="-52" width="24" height="52" rx="3" fill="#FF9900" opacity="0.8"/>
      <!-- Bar 3 -->
      <rect x="4" y="-36" width="24" height="36" rx="3" fill="#FF9900" opacity="0.6"/>
      <!-- Bar 4 - shortest -->
      <rect x="36" y="-22" width="24" height="22" rx="3" fill="#FF9900" opacity="0.4"/>

      <!-- Downward trend line -->
      <polyline points="-48,-62 -16,-44 16,-28 48,-14"
                fill="none" stroke="#FFFFFF" stroke-width="3.5"
                stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Arrow head on trend line -->
      <polyline points="40,-22 48,-14 40,-8"
                fill="none" stroke="#FFFFFF" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- ============================================ -->
    <!--  AWS SMILE (official brand element)           -->
    <!-- ============================================ -->
    <g transform="translate(256, 215)">
      <!-- The smile arc -->
      <path d="M -80 55 Q 0 100 80 55"
            fill="none" stroke="#FF9900" stroke-width="7"
            stroke-linecap="round"/>
      <!-- Arrow tip on smile -->
      <path d="M 68 60 L 82 54 L 74 44"
            fill="none" stroke="#FF9900" stroke-width="6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- ============================================ -->
    <!--  TEXT: "AWS" + "FinOps"                       -->
    <!-- ============================================ -->

    <!-- AWS -->
    <text x="256" y="395"
          text-anchor="middle" dominant-baseline="central"
          font-family="'Amazon Ember', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="36" font-weight="900" letter-spacing="8"
          fill="#FFFFFF">AWS</text>

    <!-- FinOps -->
    <text x="256" y="435"
          text-anchor="middle" dominant-baseline="central"
          font-family="'Amazon Ember', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="30" font-weight="700" letter-spacing="5"
          fill="#FF9900">FinOps</text>

    <!-- Subtle tagline -->
    <text x="256" y="468"
          text-anchor="middle" dominant-baseline="central"
          font-family="'Amazon Ember', 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="11" font-weight="400" letter-spacing="4"
          fill="#FFFFFF" opacity="0.35">COST OPTIMIZATION</text>
  </g>
</svg>
