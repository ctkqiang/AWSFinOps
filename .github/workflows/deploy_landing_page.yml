name: Deploy Docs / 部署文档到 GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-docs:
    name: 部署文档
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 部署到 GitHub Pages
        uses: actions/deploy-pages@v4
