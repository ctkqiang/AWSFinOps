name: Deploy Docs / 部署文档到 Gitee Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-docs:
    name: 部署文档
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 部署摘要
        run: |
          echo "Gitee Pages 需要在 Gitee 仓库设置中手动开启。"
          echo "文档目录: docs/"
